name: "♻️,🏋 Publisher (pyproject)"

on:
  workflow_call:

jobs:
  build-and-upload:
    name: "📦 Build, test, upload to PyPI"
    runs-on: ubuntu-latest
    env:
      OS: linux
      PYTHON: '3.10'
    steps:
      - name: "🏷 Prepare package metadata"
        run: |
          echo "VERSION=$(echo "${{ github.ref }}" | cut -d/ -f3)" >> $GITHUB_ENV
          echo "PACKAGE=$(echo "${{ github.repository }}" | cut -d/ -f2 | tr '-' '_')" >> $GITHUB_ENV

      - name: "🛍 Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: "🏗 Build package"
        run: python3 build-tools/build.py

      - name: "🧪 Run tests"
        run: python3 build-tools/test.py

      - name: "📓 Generate changelog and upload to PyPI"
        run: python3 build-tools/publish.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPITOKEN }}

      - name: "🫙 Commit and push changelog"
        run: |
          git config --local user.email "admin@clams.ai"
          git config --local user.name "clams-bot"
          for f in CHANGELOG.md; do if [ -e $f ]; then git add $f; fi; done
          git diff --cached --quiet || git commit -m 'Updated CHANGELOG'
          git push origin HEAD:main
